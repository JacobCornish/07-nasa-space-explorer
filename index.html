<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>

  <!-- ── Header ── -->
  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <img src="img/nasa-worm-logo.png" alt="NASA Worm Logo" class="logo" />
        <div class="header-title-wrap">
          <h1 class="site-title">Space Explorer</h1>
          <p class="site-subtitle">Astronomy Picture of the Day</p>
        </div>
      </div>
    </div>
  </header>

  <!-- ── Main ── -->
  <main class="container">

    <!-- Space Term of the Day -->
    <section class="fact-banner" aria-label="Space Term of the Day">
      <div class="fact-label">Space Term of the Day</div>
      <div class="fact-body">
        <span class="fact-term" id="fact-term"></span>
        <span class="fact-sep">—</span>
        <span class="fact-definition" id="fact-definition"></span>
      </div>
    </section>

    <!-- Date Controls -->
    <section class="controls" aria-label="Date range selector">
      <div class="controls-inner">
        <div class="date-group">
          <label for="startDate">Start Date</label>
          <input type="date" id="startDate" />
        </div>
        <div class="date-group">
          <label for="endDate">End Date</label>
          <input type="date" id="endDate" />
        </div>
        <button id="getImagesBtn" class="btn-primary">
          Get Space Images
        </button>
      </div>
    </section>

    <!-- Gallery -->
    <section id="gallery" class="gallery" aria-label="Space image gallery">
      <div class="placeholder">
        <p>Select a date range and click <strong>"Get Space Images"</strong> to explore the cosmos.</p>
      </div>
    </section>

  </main>

  <!-- ── Footer ── -->
  <footer class="site-footer">
    <img src="img/NASA-Logo-Large.jpg" alt="NASA Meatball Logo" class="footer-logo" />
    <p>Powered by <a href="https://api.nasa.gov/" target="_blank" rel="noopener">NASA Open APIs</a> · Astronomy Picture of the Day</p>
  </footer>

  <!-- ── Modal ── -->
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-box">
      <button id="modal-close" class="modal-close" aria-label="Close modal">✕</button>
      <div id="modal-media" class="modal-media"></div>
      <div class="modal-content">
        <h2 id="modal-title"></h2>
        <time id="modal-date" class="modal-date"></time>
        <p id="modal-explanation" class="modal-explanation"></p>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
